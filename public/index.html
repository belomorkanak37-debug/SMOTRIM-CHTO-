<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FFF6E9">
<title>СМОТРИМ!ЧТО?</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='82' font-size='82'>📺</text></svg>">
<!--
  ════════════════════════════════════════════════════════════════
  ЧЁ ПОЗЫРИТЬ? — мобильный прототип в один файл, без зависимостей.

  ▸ Вкладка «Рандом» — фильтры по типу/жанрам + случайный тайтл
    (кнопка «Тряхнуть» или реальная тряска телефона, DeviceMotion).
  ▸ Вкладка «Календарь» — месяц, лента дней, релизы по дням.

  ▸ «Рандом» умеет тянуть живую базу TMDB (сотни тысяч тайтлов):
    на Render ключ хранится в переменной TMDB_API_KEY, а HTML ходит через /api/tmdb.
    Без ключа на сервере или без сети работает офлайн-резерв, если он заполнен.
    Календарь пока моковый (TODO(API): TVMaze).
  ▸ Готово к упаковке в APK через Capacitor: положить файл как
    www/index.html; тряску при желании заменить на @capacitor/motion,
    сохранение «смотрел/в список» — на Preferences или SQLite.
  ════════════════════════════════════════════════════════════════
-->
<style>
/* ──────────── ТОКЕНЫ ──────────── */
:root{
  --paper:#FBF6EC;        /* кремовая бумага */
  --card:#FFFFFF;         /* белые карточки */
  --ink:#2E2B4D;          /* «чернила» — тёмно-синий */
  --ink-2:#807E9F;        /* приглушённый сине-серый */
  --coral:#FF8A5E;        /* тёплый акцент (ссылки) */
  --coral-ink:#E2622F;
  --butter:#F8D86B;       /* жёлтая звезда */
  --mint:#B4E5C5;
  --sky:#AED4F2;
  --peach:#F8C9A8;
  --lilac:#DAD7F5;        /* лаванда — облако */
  --lilac-deep:#C9C5F0;
  --rose:#F6B4C6;
  --sh:0 4px 0 rgba(46,43,77,.16);
  --font-doodle:'Comic Sans MS','Segoe Print','Comic Neue','Chalkboard SE',cursive;
  --font-body:system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
}

/* ──────────── БАЗА ──────────── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
[hidden]{display:none!important}
body{
  font-family:var(--font-body);color:var(--ink);
  background-color:var(--paper);
  background-image:radial-gradient(rgba(46,43,77,.08) 1.2px,transparent 1.3px);
  background-size:22px 22px;
  display:flex;justify-content:center;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
button{font:inherit;color:inherit;cursor:pointer;user-select:none;background:none;border:none}
button:focus-visible,.chip:focus-visible,.day:focus-visible{outline:3px dashed var(--coral-ink);outline-offset:2px}

/* каркас приложения */
.app{
  position:relative;width:100%;max-width:480px;
  height:100vh;height:100dvh;
  display:flex;flex-direction:column;
  background-color:var(--paper);
  background-image:radial-gradient(rgba(46,43,77,.08) 1.2px,transparent 1.3px);
  background-size:22px 22px;
}
@media (min-width:740px){ /* на desktop — «телефон» в рамке-каракуле */
  body{align-items:center;padding:22px;background-color:#E8E4D6;background-size:26px 26px}
  .app{
    height:min(900px,94vh);
    border:3px solid var(--ink);
    border-radius:36px 26px 40px 24px / 26px 40px 24px 36px;
    box-shadow:0 16px 0 rgba(46,43,77,.16);
    overflow:hidden;
  }
}

/* ──────────── ШАПКА ──────────── */
.hdr{display:flex;align-items:center;gap:10px;padding:16px 18px 6px}
.gearBtn{
  position:relative;margin-left:auto;flex:0 0 auto;
  width:48px;height:48px;color:var(--ink);
  background:var(--lilac);border:2.5px solid var(--ink);border-radius:50%;
  box-shadow:0 3px 0 rgba(46,43,77,.2);
  display:flex;align-items:center;justify-content:center;
}
.gearBtn svg{width:26px;height:26px}
.gearBtn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(46,43,77,.2)}
.gearBtn.on{background:var(--rose)}
.fcount{
  position:absolute;top:-6px;right:-6px;min-width:21px;height:21px;padding:0 5px;
  font-family:var(--font-doodle);font-size:12px;font-weight:700;color:#fff;
  background:var(--coral-ink);border:2px solid var(--ink);border-radius:50%;
  display:flex;align-items:center;justify-content:center;line-height:1;
}

/* ──────────── КОНТЕНТ ──────────── */
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 16px 16px;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column}
.tab{animation:tabIn .25s ease}
@keyframes tabIn{from{opacity:0;transform:translateY(6px)}}

/* ─── СТАРТОВЫЙ ЭКРАН: облако «Тряхни телефон» ─── */
.tab-random{position:relative;flex:1;display:flex;flex-direction:column;min-height:0}
.dots{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.dots i,.dots svg{
  position:absolute;left:var(--x);top:-18%;
  display:block;will-change:transform,opacity;
  animation:doodleFall var(--dur) linear var(--delay) infinite;
}
.dots i{
  width:var(--d);height:var(--d);border-radius:50%;
  background:var(--c);
}
.dots svg{width:var(--d);height:var(--d)}
@keyframes doodleFall{
  0%{transform:translate3d(0,-18vh,0) rotate(0deg);opacity:0}
  10%{opacity:.95}
  90%{opacity:.95}
  100%{transform:translate3d(var(--drift),118vh,0) rotate(var(--rot));opacity:0}
}
.shakeArea{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding-bottom:30px}

.cloudBtn{
  position:relative;width:min(86%,330px);aspect-ratio:320/210;
  display:flex;align-items:center;justify-content:center;
  background:none;border:none;animation:cloudFloat 4s ease-in-out infinite;
}
.cloudShape{position:absolute;inset:0;width:100%;height:100%;
  filter:drop-shadow(0 7px 0 rgba(46,43,77,.16));}
.cloudText{
  position:relative;z-index:2;font-family:var(--font-doodle);font-weight:700;
  font-size:clamp(30px,10vw,44px);line-height:1.05;color:var(--ink);text-align:center;
  transform:rotate(-1.5deg);
}
.cloudStar{position:absolute;top:-6%;left:50%;transform:translateX(-50%);width:44px;height:44px;z-index:3;animation:starTwinkle 3s ease-in-out infinite}
.cloudHeart{position:absolute;bottom:-12%;left:50%;transform:translateX(-50%);width:40px;height:38px;z-index:3;animation:heartBeat 2.4s ease-in-out infinite}
.shakeLinesL{position:absolute;left:-13%;top:34%;width:30px;height:60px;z-index:3}
.shakeLinesR{position:absolute;right:-13%;top:34%;width:30px;height:60px;z-index:3}
.cloudBtn:active{animation:none;transform:scale(.97) rotate(-1deg)}
@keyframes cloudFloat{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-9px) rotate(.6deg)}}
@keyframes starTwinkle{0%,100%{transform:translateX(-50%) scale(1) rotate(0)}50%{transform:translateX(-50%) scale(1.14) rotate(12deg)}}
@keyframes heartBeat{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.16)}}

.shakeSub{margin-top:16px;max-width:30ch;text-align:center;font-family:var(--font-doodle);font-size:16px;line-height:1.4;color:var(--ink-2)}
.shakeSub .mark{background:linear-gradient(transparent 60%,var(--lilac) 60%);color:var(--ink)}
.motion{
  display:block;margin:14px auto 0;font-family:var(--font-doodle);font-size:12.5px;color:var(--ink-2);
  background:#fff;border:2px dashed rgba(46,43,77,.5);border-radius:12px 16px 10px 14px/16px 10px 14px 12px;
  padding:8px 13px;
}

/* шейк-анимация облака при нажатии */
.cloudBtn.rattle{animation:cloudRattle .8s ease}
@keyframes cloudRattle{
  10%{transform:rotate(-3deg) translate(-5px,2px)}
  25%{transform:rotate(3deg) translate(6px,-3px)}
  40%{transform:rotate(-2.4deg) translate(-5px,2px)}
  55%{transform:rotate(2deg) translate(5px,2px)}
  70%{transform:rotate(-1.4deg) translate(-3px,-1px)}
  85%{transform:rotate(1deg) translate(2px,1px)}
}

/* ─── МОДАЛКА РЕЗУЛЬТАТА ─── */
.resultBackdrop{position:absolute;inset:0;z-index:30;background:rgba(46,43,77,.4);animation:fadeIn .2s ease}
.resultModal{
  position:absolute;inset:0;z-index:31;display:flex;flex-direction:column;
  animation:modalUp .34s cubic-bezier(.34,1.4,.64,1);
}
.resultClose{
  position:absolute;top:14px;right:16px;z-index:33;width:44px;height:44px;
  font-size:19px;color:var(--ink);background:#fff;
  border:3px solid var(--ink);border-radius:50%;
  box-shadow:0 3px 0 rgba(46,43,77,.2);
  display:flex;align-items:center;justify-content:center;
}
.resultClose:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(46,43,77,.2)}
.resultScroll{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:18px 16px 26px;
  background:var(--paper);
  background-image:radial-gradient(rgba(46,43,77,.07) 1.2px,transparent 1.3px);
  background-size:22px 22px;
}
@keyframes modalUp{from{transform:translateY(100%)}}
@keyframes fadeIn{from{opacity:0}}

/* постер сверху */
.rPoster{
  position:relative;width:74%;max-width:280px;margin:6px auto 0;aspect-ratio:2/3;
  border:3.5px solid var(--ink);overflow:hidden;background:#fff;
  border-radius:22px 16px 26px 18px / 16px 26px 18px 22px;
  box-shadow:0 8px 0 rgba(46,43,77,.16);transform:rotate(-1deg);
}
.rPoster img{width:100%;height:100%;object-fit:cover;display:block}
.rPoster .pph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  font-family:var(--font-doodle);font-size:13px;color:var(--ink-2);
  background:repeating-linear-gradient(45deg,#fff,#fff 9px,#F2EEE2 9px,#F2EEE2 18px)}
.rPoster .pph span{font-size:40px}
.rPoster .pph i{font-style:normal}
.rPosterStar{position:absolute;left:50%;bottom:-20px;transform:translateX(-50%);width:42px;height:42px;z-index:2}

/* белая карточка с деталями (наезжает на постер) */
.rSheet{
  position:relative;margin:-14px 0 0;padding:24px 18px 18px;z-index:1;
  background:var(--card);border:3px solid var(--ink);
  border-radius:26px 22px 28px 20px / 22px 28px 20px 26px;
  box-shadow:0 6px 0 rgba(46,43,77,.14);
}
.rHeart{position:absolute;top:-12px;right:18px;width:38px;height:36px;animation:heartBeat 2.4s ease-in-out infinite}
.rTitle{
  display:block;width:fit-content;font-family:var(--font-doodle);font-size:25px;line-height:1.15;color:var(--ink);
  text-decoration:underline wavy var(--coral);text-decoration-thickness:2px;text-underline-offset:5px;
}
.rTitle:active{color:var(--coral-ink)}
.rTitle .ext{font-size:15px;color:var(--coral-ink)}
.rOrig{font-size:14px;color:var(--ink-2);margin-top:4px;line-height:1.3}
.rMeta{font-family:var(--font-doodle);font-size:14px;color:var(--ink-2);margin-top:4px}
.rMeta .star{color:#E0A200}

/* теги-таблетки */
.tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.tag{
  font-family:var(--font-doodle);font-size:13.5px;padding:6px 13px;
  background:#fff;border:2.5px solid var(--ink);color:var(--ink);
  border-radius:14px 9px 16px 8px / 9px 16px 8px 14px;
}
.tag:nth-child(even){border-radius:9px 16px 8px 14px / 16px 8px 14px 9px;transform:rotate(.5deg)}
.tag.t-type{background:var(--mint)}
.tag.t-year{background:var(--sky)}
.tag.t-plat{background:var(--peach)}

.rDesc{font-size:15px;line-height:1.5;color:var(--ink-2);margin-top:14px}

/* кнопки действий */
.acts{display:flex;gap:10px;margin-top:16px}
.act{
  flex:1;font-family:var(--font-doodle);font-size:14px;padding:13px 4px;
  background:#fff;border:2.5px solid var(--ink);color:var(--ink);box-shadow:0 4px 0 rgba(46,43,77,.18);
}
.act:nth-child(1){border-radius:16px 9px 18px 10px / 9px 18px 10px 16px}
.act:nth-child(2){border-radius:9px 18px 10px 16px / 18px 10px 16px 9px;transform:rotate(.5deg)}
.act:nth-child(3){border-radius:18px 10px 16px 9px / 10px 16px 9px 18px;transform:rotate(-.5deg)}
.act:active{transform:translateY(3px)!important;box-shadow:0 0 0 rgba(0,0,0,0)}
.act[data-act="seen"][aria-pressed="true"]{background:var(--mint)}
.act[data-act="list"][aria-pressed="true"]{background:var(--butter)}


/* фильтры */
.flabel{font-family:var(--font-doodle);font-size:13px;letter-spacing:.4px;margin:12px 2px 8px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  font-family:var(--font-doodle);font-size:14px;min-height:40px;padding:8px 13px;
  display:inline-flex;align-items:center;gap:6px;
  background:#fff;border:2.5px solid var(--ink);box-shadow:0 3px 0 rgba(46,43,77,.15);
}
.chip:nth-child(4n+1){border-radius:14px 9px 16px 8px / 9px 16px 8px 14px}
.chip:nth-child(4n+2){border-radius:9px 16px 8px 14px / 16px 8px 14px 9px;transform:rotate(.6deg)}
.chip:nth-child(4n+3){border-radius:16px 8px 14px 9px / 8px 14px 9px 16px;transform:rotate(-.7deg)}
.chip:nth-child(4n+4){border-radius:8px 14px 9px 16px / 14px 9px 16px 8px}
.chip[aria-pressed="true"]{box-shadow:0 1px 0 rgba(46,43,77,.15);transform:translateY(2px) rotate(-1deg)}
.chip[aria-pressed="true"]::after{content:"✓";font-size:12px}
.chip.c-sky[aria-pressed="true"]{background:var(--sky)}
.chip.c-peach[aria-pressed="true"]{background:var(--peach)}
.chip.c-lilac[aria-pressed="true"]{background:var(--lilac)}
.chip.c-butter[aria-pressed="true"]{background:var(--butter)}
.chip.c-mint[aria-pressed="true"]{background:var(--mint)}
.reset{
  margin-top:14px;font-family:var(--font-doodle);font-size:13px;color:var(--ink-2);
  border:2px dashed rgba(46,43,77,.55);padding:9px 14px;
  border-radius:12px 18px 10px 16px / 18px 10px 16px 12px;
}
.reset:disabled{opacity:.4;cursor:default}

/* ──────────── ПАНЕЛЬ ФИЛЬТРОВ (оверлей) ──────────── */
.sheetBackdrop{
  position:absolute;inset:0;z-index:20;
  background:rgba(46,43,77,.34);
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0}}
.sheet{
  position:absolute;left:0;right:0;top:0;z-index:21;
  max-height:88%;display:flex;flex-direction:column;
  background:var(--paper);
  background-image:radial-gradient(rgba(46,43,77,.08) 1.2px,transparent 1.3px);
  background-size:22px 22px;
  border-bottom:3px solid var(--ink);
  border-radius:0 0 28px 22px / 0 0 22px 28px;
  box-shadow:0 10px 0 rgba(46,43,77,.16);
  animation:sheetDrop .28s cubic-bezier(.34,1.3,.64,1);
}
@keyframes sheetDrop{from{transform:translateY(-100%)}}
.sheetHead{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px 10px;flex:0 0 auto;
}
.sheetHead b{font-family:var(--font-doodle);font-size:22px}
.sheetStatus{font-family:var(--font-doodle);font-size:13.5px;color:var(--ink-2);line-height:1.4;padding:0 18px 8px}
.sheetStatus b{color:var(--ink)}
.sheetClose{
  font-family:var(--font-doodle);font-size:15px;color:var(--ink);
  background:var(--mint);border:2.5px solid var(--ink);
  border-radius:13px 9px 15px 8px / 9px 15px 8px 13px;
  box-shadow:0 3px 0 rgba(46,43,77,.2);padding:8px 16px;
}
.sheetClose:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(46,43,77,.2)}
.sheetBody{overflow-y:auto;padding:2px 18px 22px;-webkit-overflow-scrolling:touch}
.sheetBody .flabel:first-child{margin-top:4px}

/* ──────────── ЗАГЛУШКА ПОСТЕРА (общая) ──────────── */
.ithumb img{position:relative;z-index:1;width:100%;height:100%;object-fit:cover;display:block}
.rPoster.noimg .pph,.ithumb.noimg .pph{display:flex}  /* постер не загрузился — показать заглушку */
.pph{
  position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  font-family:var(--font-doodle);font-size:10.5px;color:var(--ink-2);text-align:center;
  background:repeating-linear-gradient(45deg,#fff,#fff 8px,#F2EEE2 8px,#F2EEE2 16px);
}
.pph span{font-size:28px}
.pph i{font-style:normal}

/* ──────────── СПИСКИ: «Просмотрено» и «Буду смотреть» ──────────── */
.lhead{font-family:var(--font-doodle);font-size:22px;margin:6px 2px 2px}
.lsub{font-size:13.5px;color:var(--ink-2);line-height:1.4;margin:0 2px 14px}
.ilist{display:flex;flex-direction:column;gap:14px;padding:2px 2px 10px}
.item{
  position:relative;display:flex;gap:12px;padding:12px;
  background:var(--card);border:3px solid var(--ink);
  border-radius:18px 24px 16px 26px / 24px 16px 26px 18px;
  box-shadow:0 5px 0 rgba(46,43,77,.15);
}
.item:nth-child(odd){transform:rotate(-.3deg)}
.item:nth-child(even){transform:rotate(.35deg)}
.ithumb{
  position:relative;flex:0 0 64px;width:64px;height:96px;display:block;
  border:2.5px solid var(--ink);overflow:hidden;background:#fff;
  border-radius:10px 6px 12px 7px / 6px 12px 7px 10px;
}
.ithumb .pph span{font-size:20px}
.ithumb .pph i{display:none}        /* в мини-постере хватает эмодзи */
.ibody{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
.ititle{
  font-family:var(--font-doodle);font-size:16.5px;line-height:1.2;width:fit-content;color:var(--ink);
  text-decoration:underline wavy var(--coral);text-decoration-thickness:1.5px;text-underline-offset:3px;
}
.imeta{font-family:var(--font-doodle);font-size:12px;color:var(--ink-2)}
.idesc{font-size:13px;line-height:1.4;color:var(--ink-2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.stars{display:flex;gap:1px;margin:1px 0}
.stars button{border:none;background:none;cursor:pointer;font-size:25px;line-height:1;padding:1px 4px;color:#E3D5BD;transition:transform .1s}
.stars button.on{color:#E9A400;text-shadow:0 1px 0 rgba(46,43,77,.22)}
.stars button:active{transform:scale(1.25) rotate(-8deg)}
.note{
  width:100%;font-family:inherit;font-size:13px;line-height:1.4;color:var(--ink);
  background:#FFFDF2;border:2px dashed rgba(46,43,77,.4);resize:none;
  border-radius:10px 14px 9px 12px / 14px 9px 12px 10px;padding:8px 10px;
}
.note:focus{outline:none;border-color:var(--coral-ink)}
.note::placeholder{color:var(--ink-2);opacity:.7}
.irow{display:flex;gap:8px;margin-top:2px}
.ibtn{
  font-family:var(--font-doodle);font-size:12.5px;padding:7px 12px;cursor:pointer;
  background:#fff;border:2px solid var(--ink);color:var(--ink);
  border-radius:12px 8px 14px 9px / 8px 14px 9px 12px;
  box-shadow:0 2px 0 rgba(46,43,77,.18);
}
.ibtn.go{background:var(--mint)}
.ibtn.del{border-style:dashed;border-color:rgba(46,43,77,.5);color:var(--ink-2);box-shadow:none}
.ibtn:active{transform:translateY(2px);box-shadow:none}
.lempty{
  min-height:280px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;text-align:center;padding:30px 12px;color:var(--ink-2);font-size:13.5px;
}
.lempty .big{font-family:var(--font-doodle);font-size:17px;color:var(--ink);line-height:1.35}
.emptyArt{
  width:min(43vw,142px);height:auto;display:block;margin:0 auto 2px;
  overflow:visible;filter:drop-shadow(0 7px 0 rgba(46,43,77,.13));
}
.emptyArt .float{animation:emptyFloat 4.4s ease-in-out infinite}
.emptyArt .twinkle{animation:emptyTwinkle 2.8s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
@keyframes emptyFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-7px)}
}
@keyframes emptyTwinkle{
  0%,100%{transform:scale(1);opacity:.75}
  50%{transform:scale(1.18);opacity:1}
}

/* ──────────── НИЖНЯЯ НАВИГАЦИЯ ──────────── */
.nav{
  display:flex;gap:10px;background-color:var(--paper);
  border-top:3px dashed rgba(46,43,77,.3);
  padding:10px 16px calc(12px + env(safe-area-inset-bottom,0px));
}
.nav button{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  font-family:var(--font-doodle);font-size:12.5px;color:var(--ink-2);
  border:2.5px solid transparent;padding:7px 6px;
  border-radius:16px 10px 18px 9px / 10px 18px 9px 16px;
}
.nav button svg{width:26px;height:26px}
.nav button.active{color:var(--ink);background:#fff;border-color:var(--ink);box-shadow:0 3px 0 rgba(46,43,77,.18);transform:rotate(-1deg)}

/* ──────────── ТОСТ И ИСКРЫ ──────────── */
.toast{
  position:absolute;left:50%;bottom:94px;z-index:30;max-width:86%;text-align:center;
  transform:translateX(-50%) translateY(14px) rotate(-1deg);
  background:#fff;border:2.5px solid var(--ink);
  border-radius:14px 18px 12px 20px / 18px 12px 20px 14px;
  box-shadow:0 4px 0 rgba(46,43,77,.2);
  padding:10px 16px;font-family:var(--font-doodle);font-size:13.5px;
  opacity:0;pointer-events:none;transition:.25s;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0) rotate(-1deg)}
.sparks,.shakeFx,.globalFx{inset:0;pointer-events:none;overflow:hidden}
.sparks,.shakeFx{position:absolute}
.sparks{z-index:5}
.shakeFx{z-index:80}
.globalFx{position:fixed;z-index:2147483647}
.spark{
  position:absolute;left:0;top:0;font-family:var(--font-doodle);line-height:1;
  font-size:var(--fs);opacity:0;
  will-change:transform,opacity;
  contain:layout paint style;
  backface-visibility:hidden;
  transform:translate3d(var(--sx),var(--sy),0) translate(-50%,-50%) scale(.42);
  animation:sparkFly var(--dur) cubic-bezier(.18,.82,.22,1) var(--delay) forwards;
  text-shadow:0 2px 0 rgba(46,43,77,.13);
}
.cloudBurst{
  position:absolute;left:50%;top:42%;z-index:6;transform:translate(-50%,-50%);
  font-family:var(--font-doodle);font-size:42px;line-height:1;white-space:nowrap;
  pointer-events:none;animation:cloudBurstPop .72s cubic-bezier(.18,1.25,.3,1) forwards;
  filter:drop-shadow(0 3px 0 rgba(46,43,77,.2));
}
.app.shakeImpact{animation:appShakeImpact .58s ease}
@keyframes appShakeImpact{
  0%,100%{transform:translate(0,0) rotate(0)}
  10%{transform:translate(-5px,3px) rotate(-.7deg)}
  22%{transform:translate(6px,-3px) rotate(.75deg)}
  35%{transform:translate(-5px,-2px) rotate(-.55deg)}
  50%{transform:translate(4px,3px) rotate(.45deg)}
  68%{transform:translate(-2px,1px) rotate(-.25deg)}
}
@keyframes cloudBurstPop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.25) rotate(-8deg)}
  22%{opacity:1;transform:translate(-50%,-78%) scale(1.18) rotate(3deg)}
  100%{opacity:0;transform:translate(-50%,-150%) scale(.88) rotate(10deg)}
}
@keyframes sparkFly{
  0%{
    opacity:0;
    transform:translate3d(var(--sx),var(--sy),0) translate(-50%,-50%) scale(.42) rotate(0deg);
  }
  14%{
    opacity:1;
    transform:translate3d(var(--mx),var(--my),0) translate(-50%,-50%) scale(1.08) rotate(var(--rot-mid));
  }
  70%{opacity:1}
  100%{
    opacity:0;
    transform:translate3d(var(--ex),var(--ey),0) translate(-50%,-50%) scale(.72) rotate(var(--rot));
  }
}
@keyframes fly{
  0%{transform:translate(-50%,-50%) scale(.25) rotate(0deg);opacity:0}
  10%{opacity:1;transform:translate(-50%,-50%) scale(1.2) rotate(12deg)}
  100%{transform:translate(calc(-50% + var(--tx)),calc(-50% + var(--ty))) scale(.85) rotate(var(--rr));opacity:0}
}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
  .dots i,.dots svg{top:var(--still-y)!important;transform:none!important;opacity:.7}
}
</style>
</head>

<script>
/* ============================================================================
   «СМОТРИМ!ЧТО?» — логика прототипа
   ----------------------------------------------------------------------------
   Архитектура:
     1) Данные  — живая база TMDB + офлайн-резерв (ваша база), всё через DataAPI.
                  Реальные источники подключаются ТОЛЬКО внутри DataAPI,
                  остальной код менять не придётся.
     2) Состояние — единый объект state (вкладка, фильтры, выбранный день…).
     3) Рендер  — маленькие функции render*(), каждая отвечает за свой кусок.
     4) События — делегирование кликов на контейнерах, всё вешается в init().

   РЕАЛЬНАЯ БАЗА (готово): рандом-пул тайтлов
     - TMDB /discover/movie и /discover/tv, язык ru-RU, все 4 типа:
       аниме = keyword «anime» (210024), мультфильмы = Animation без аниме.
     - Добавьте бесплатный ключ в TMDB_API_KEY на Render — и пул станет
       практически бесконечным (до 10 000 тайтлов на каждую комбинацию
       фильтров, случайная страница × случайный тайтл).
     - Без ключа или при ошибке сети прототип берёт офлайн-резерв (вашу базу).
     - Альтернатива для аниме: AniList GraphQL (graphql.anilist.co,
       без ключа), но описания там на английском — поэтому по умолчанию
       аниме тоже идёт из TMDB ради русских описаний.

   TODO(Capacitor): упаковка в APK
     - этот файл положить как www/index.html (или public/ при Vite-сборке)
     - тряска: вместо window devicemotion использовать @capacitor/motion
     - сохранение «Смотрел»/«В список»: @capacitor/preferences или SQLite —
       сейчас это Set'ы в state.* только на время сессии (по ТЗ).
   ========================================================================== */
'use strict';

/* ───────────────────────── helpers ───────────────────────── */
const $ = (sel, root = document) => root.querySelector(sel);
const pad = n => String(n).padStart(2, '0');
const rnd = arr => arr[Math.floor(Math.random() * arr.length)];
const esc = s => String(s).replace(/[&<>"]/g,
  ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[ch]));

// русские множественные формы: plural(3, 'релиз','релиза','релизов')
function plural(n, one, few, many){
  const n10 = n % 10, n100 = n % 100;
  if (n10 === 1 && n100 !== 11) return one;
  if (n10 >= 2 && n10 <= 4 && (n100 < 12 || n100 > 14)) return few;
  return many;
}

const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ───────────────────────── справочники ───────────────────────── */
const TYPES = {
  film:    { name: 'Фильм',      low: 'фильм',      plural: 'Фильмы',      emoji: '🎬', c: 'sky'    },
  series:  { name: 'Сериал',     low: 'сериал',     plural: 'Сериалы',     emoji: '📺', c: 'peach'  },
  anime:   { name: 'Аниме',      low: 'аниме',      plural: 'Аниме',       emoji: '🌸', c: 'lilac'  },
  cartoon: { name: 'Мультфильм', low: 'мультфильм', plural: 'Мультфильмы', emoji: '🐥', c: 'butter' },
};

const GENRES = ['комедия','драма','фантастика','ужасы','романтика',
                'приключения','детектив','фэнтези','боевик'];

// цвета жанровых чипов крутим по кругу — палитра из CSS
const GENRE_C = ['butter','mint','sky','peach','lilac'];

/* ── фильтр по годам выпуска ── */
const ERAS = {
  any:    { label: 'Любой год', test: () => true },
  new:    { label: 'Новинки',   sub: '2020+',     min: 2020, max: 9999 },
  '10s':  { label: '2010-е',    sub: '2010–2019', min: 2010, max: 2019 },
  '00s':  { label: '2000-е',    sub: '2000–2009', min: 2000, max: 2009 },
  '90s':  { label: '90-е',      sub: '1990–1999', min: 1990, max: 1999 },
  retro:  { label: 'Ретро',     sub: 'до 1989',   min: 0,    max: 1989 },
};
const inEra = (year, era) => {
  const e = ERAS[era];
  if (!e || era === 'any') return true;
  const y = Number(year) || 0;
  return y >= e.min && y <= e.max;
};

/* ── фильтр по стране (русское / зарубежное) ── */
const ORIGINS = {
  any:     { label: 'Любое' },
  ru:      { label: 'Русское' },
  foreign: { label: 'Зарубежное' },
};
// «русское»: страны и языки, которые считаем своими
// (страна происхождения — самый точный фильтр TMDB; язык — подстраховка)
const RU_COUNTRIES = ['RU','SU','UA','BY','KZ']; // постсоветское пространство
const RU_LANGS = ['ru','uk','be','kk'];

/* ── постер: реальный из TMDB или локальный дудл-постер ── */
const IMG_BASE = 'https://image.tmdb.org/t/p/'; // + размер + poster_path
function posterUrl(path, size = 'w342'){
  if (!path) return '';
  const src = String(path).trim();
  // Поддерживаем TMDB-пути вида /abc.jpg, готовые URL, data-uri и blob из своей базы.
  if (/^(https?:|data:|blob:)/i.test(src)) return src;
  if (src.startsWith('//')) return 'https:' + src;
  return IMG_BASE + size + (src.startsWith('/') ? src : '/' + src);
}
function posterLines(text, max = 14, limit = 4){
  const words = String(text || 'Без названия').split(/\s+/).filter(Boolean);
  const lines = [];
  let line = '';
  for (const w of words){
    const next = line ? line + ' ' + w : w;
    if (next.length > max && line){ lines.push(line); line = w; }
    else line = next;
  }
  if (line) lines.push(line);
  if (lines.length > limit){
    lines.length = limit;
    lines[limit - 1] = lines[limit - 1].replace(/…$/,'') + '…';
  }
  return lines;
}
function fallbackPoster(t, mini = false){
  const tp = TYPES[t.type] || TYPES.film;
  const title = posterLines(t.title, mini ? 10 : 14, mini ? 3 : 4);
  const year = t.year && t.year !== '????' ? t.year : '';
  const fs = mini ? 18 : 28;
  const y0 = mini ? 78 : 126;
  const titleSvg = title.map((line, i) =>
    `<text x="50%" y="${y0 + i * (fs + 8)}" text-anchor="middle" font-family="Comic Sans MS, Segoe Print, cursive" font-size="${fs}" font-weight="700" fill="#2E2B4D">${esc(line)}</text>`
  ).join('');
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="342" height="513" viewBox="0 0 342 513">
    <defs>
      <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="4" cy="4" r="2" fill="#2E2B4D" opacity=".12"/></pattern>
      <linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#DAD7F5"/><stop offset="1" stop-color="#F8C9A8"/></linearGradient>
    </defs>
    <rect width="342" height="513" rx="28" fill="#FBF6EC"/>
    <rect x="18" y="18" width="306" height="477" rx="24" fill="url(#g)" stroke="#2E2B4D" stroke-width="8"/>
    <rect x="18" y="18" width="306" height="477" rx="24" fill="url(#dots)"/>
    <text x="50%" y="86" text-anchor="middle" font-size="54">${tp.emoji || '🎬'}</text>
    ${titleSvg}
    <text x="50%" y="410" text-anchor="middle" font-family="Comic Sans MS, Segoe Print, cursive" font-size="22" fill="#2E2B4D" opacity=".74">${esc(tp.low)}${year ? ' · ' + esc(year) : ''}</text>
    <text x="50%" y="458" text-anchor="middle" font-family="Comic Sans MS, Segoe Print, cursive" font-size="38">🍿 🎬 📺</text>
  </svg>`;
  return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
}
function posterInner(t, w){ // w: 'w185' (карточка) / 'w154' (список)
  const remote = posterUrl(t.poster, w);
  const fallback = fallbackPoster(t, w === 'w154');
  const src = remote || fallback;
  const cls = remote ? '' : ' generated';
  return `<img class="posterImg${cls}" src="${esc(src)}" data-fallback="${esc(fallback)}"
            alt="Постер: ${esc(t.title)}" loading="lazy" decoding="async"
            onerror="this.onerror=null;this.src=this.dataset.fallback;this.classList.add('generated');this.parentNode.classList.add('generated')">`;
}
const thumb = t => posterInner(t, 'w154');

/* ── ссылка «загуглить тайтл» ── */
function googleHref(t){
  const tp = TYPES[t.type];
  const kind = t.type === 'anime' ? 'аниме'
             : t.type === 'series' ? 'сериал'
             : t.type === 'cartoon' ? 'мультфильм' : 'фильм';
  const q = `${t.title} ${t.year !== '????' ? t.year : ''} ${kind} смотреть`;
  return 'https://www.google.com/search?q=' + encodeURIComponent(q.trim());
}

/* ───────────────── РЕАЛЬНАЯ БАЗА: TMDB ─────────────────
   Как включить на Render:
     1) Бесплатный аккаунт на themoviedb.org
     2) Settings → API → «API Key (v3 auth)»
     3) Добавить ключ в переменную окружения TMDB_API_KEY.
   Без ключа на сервере живой TMDB недоступен, но интерфейс продолжит работать.

   Внимание: не публикуйте TMDB_KEY в браузерном коде. Для GitHub/Render
   используется серверный прокси /api/tmdb из server.js. */
const TMDB_PROXY = location.protocol !== 'file:';
const TMDB_KEY = ''; // На Render ключ хранится в TMDB_API_KEY и не попадает в GitHub.
// Если отключить прокси и вставить длинный v4-токен (начинается с eyJ…) — тоже сработает:
const TMDB_V4 = TMDB_KEY.startsWith('eyJ'); // v4 ходит через Bearer-заголовок
const TMDB_ENABLED = TMDB_PROXY || Boolean(TMDB_KEY);

const TMDB_BASE = TMDB_PROXY ? '/api/tmdb' : 'https://api.themoviedb.org/3';
const ANIME_KW = 210024; // id ключевого слова «anime» в TMDB

// наши жанры → id жанров TMDB (у кино и у сериалов справочники разные)
const G_MOVIE = { 'комедия':35, 'драма':18, 'фантастика':878, 'ужасы':27,
  'романтика':10749, 'приключения':12, 'детектив':9648, 'фэнтези':14, 'боевик':28 };
const G_TV = { 'комедия':35, 'драма':18, 'фантастика':10765, 'ужасы':9648,
  'романтика':18, 'приключения':10759, 'детектив':9648, 'фэнтези':10765, 'боевик':10759 };
// обратный словарь: id из ответа → подпись на карточке
const G_NAME = { 35:'комедия', 18:'драма', 878:'фантастика', 27:'ужасы',
  10749:'романтика', 12:'приключения', 9648:'детектив', 14:'фэнтези',
  28:'боевик', 10765:'фантастика', 10759:'приключения', 53:'детектив',
  80:'детектив', 10751:'семейное', 16:'анимация' };

const tmdbPages = new Map(); // кэш total_pages на каждую комбинацию фильтров

// собирает discover-URL под тип, жанры, страну и эпоху
function tmdbQuery(type, genres, origin, era){
  const isTV = type === 'series' || type === 'anime';
  const gmap = isTV ? G_TV : G_MOVIE;
  const ids = [...new Set(genres.map(g => gmap[g]).filter(Boolean))];
  // Порог по числу оценок отсекает мусор со «дна» базы. Но у русского кино
  // и у старых фильмов оценок объективно меньше, поэтому порог снижаем,
  // иначе пул схлопывается до пары тайтлов.
  let minVotes = type === 'anime' ? 40 : isTV ? 80 : 150;
  if (origin === 'ru') minVotes = isTV ? 8 : 20;
  if (era === 'retro' || era === '90s') minVotes = Math.min(minVotes, 25);
  const p = new URLSearchParams({
    language: 'ru-RU',
    include_adult: 'false',
    sort_by: 'popularity.desc',
    'vote_count.gte': String(minVotes),
  });
  if (TMDB_KEY && !TMDB_V4) p.set('api_key', TMDB_KEY); // v3-ключ едет в параметрах URL
  // в with_genres запятая = «И», вертикальная черта = «ИЛИ»
  if (type === 'cartoon'){
    p.set('with_genres', ids.length ? '16,' + ids.join('|') : '16');
    p.set('without_keywords', String(ANIME_KW)); // анимация, но не аниме
  } else {
    if (ids.length) p.set('with_genres', ids.join('|'));
    if (type === 'anime') p.set('with_keywords', String(ANIME_KW));
    else p.set('without_genres', '16'); // кино/сериалы без мультиков
  }
  // страна: самый точный способ в TMDB — with_origin_country (поддержан и для кино, и для сериалов)
  if (origin === 'ru'){
    // «ИЛИ» по странам происхождения: RU, SU (СССР), UA, BY, KZ
    p.set('with_origin_country', RU_COUNTRIES.join('|'));
  } else if (origin === 'foreign'){
    // зарубежное = исключаем наши языки (origin_country исключать нельзя — нет «without»)
    p.set('without_original_language', RU_LANGS.join('|'));
  }
  // эпоха: диапазон дат релиза (ключи дат у кино и сериалов разные)
  const e = ERAS[era];
  if (e && era !== 'any'){
    const gte = `${String(e.min).padStart(4, '0')}-01-01`;
    const lte = `${e.max >= 9999 ? '2100' : e.max}-12-31`;
    if (isTV){
      p.set('first_air_date.gte', gte); p.set('first_air_date.lte', lte);
    } else {
      p.set('primary_release_date.gte', gte); p.set('primary_release_date.lte', lte);
    }
  }
  return TMDB_BASE + (isTV ? '/discover/tv' : '/discover/movie') + '?' + p;
}

async function tmdbJSON(url){
  const opts = TMDB_V4
    ? { headers: { Authorization: 'Bearer ' + TMDB_KEY, accept: 'application/json' } }
    : undefined;
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error('TMDB ответил ' + r.status);
  return r.json();
}

// ответ TMDB → формат карточки приложения
function tmdbToTitle(x, type){
  const date = x.release_date || x.first_air_date || '';
  const genres = [...new Set((x.genre_ids || []).map(id => G_NAME[id]).filter(Boolean))];
  const lang = x.original_language || '';
  const countries = x.origin_country || []; // массив ISO-кодов стран
  const isRu = RU_LANGS.includes(lang) ||
               countries.some(c => RU_COUNTRIES.includes(c));
  return {
    id: 'tmdb-' + type + '-' + x.id,
    type,
    title: x.title || x.name || x.original_title || x.original_name || 'Без названия',
    year: Number(date.slice(0, 4)) || '????',
    genres: genres.slice(0, 3),
    rating: x.vote_average || 0,
    poster: x.poster_path || x.backdrop_path || null, // постер TMDB; если нет — берём фон как запас
    origin: isRu ? 'ru' : 'foreign',
    desc: x.overview || 'Русское описание ещё не подвезли. Загадка — тоже жанр.',
  };
}

/* Случайный тайтл из ВСЕЙ базы под фильтры.
   Хитрость «бесконечности»: discover отдаёт до 500 страниц по 20 тайтлов
   на каждую комбинацию фильтров; берём случайную страницу, на ней —
   случайный тайтл. total_pages кэшируем, чтобы не дёргать API лишний раз. */
async function tmdbRandom(types, genres, origin, era){
  const type = rnd(types.length ? types : Object.keys(TYPES));
  const base = tmdbQuery(type, genres, origin, era);
  let pages = tmdbPages.get(base);
  if (pages === undefined){
    const first = await tmdbJSON(base + '&page=1');
    pages = Math.min(first.total_pages || 0, 500); // больше 500 TMDB не отдаёт
    tmdbPages.set(base, pages);
  }
  if (!pages) return null; // под такие фильтры в базе пусто

  // Важно: не отдаём первый попавшийся результат, потому что у части тайтлов TMDB
  // нет poster_path. Сначала несколько раз ищем именно карточку с постером.
  let backup = null;
  for (let attempt = 0; attempt < 10; attempt++){
    const page = 1 + Math.floor(Math.random() * pages);
    const data = await tmdbJSON(base + '&page=' + page);
    const results = (data.results || []).filter(Boolean);
    if (!results.length) continue;
    backup = backup || rnd(results);
    const withRealPoster = results.filter(x => x.poster_path);
    if (withRealPoster.length) return tmdbToTitle(rnd(withRealPoster), type);
    const withBackdrop = results.filter(x => x.backdrop_path);
    if (withBackdrop.length && attempt > 4) return tmdbToTitle(rnd(withBackdrop), type);
  }
  return backup ? tmdbToTitle(backup, type) : null;
}

   Моков больше нет. Сюда подгружается ваша собственная база —

// Расширенный набор тематических эмодзи для кино и ТВ
const SPARK_CHARS = [
  '🎬','📺','🎥','📹','🎞️','📽️','🎭','🍿','🎫','📼','📡','🕹️',
  '⭐','🌟','✨','💫','🏆','🏅','🥇','👀','👓','🕶️','🤓',
  '🎉','🎊','🎈','💥','⚡','✦','★','✺','✧','♡','♪'
];
const SPARK_LIMIT = 72;

function fxLayer(){
  let layer = $('#globalFx');
  if (!layer){
    layer = document.createElement('div');
    layer.id = 'globalFx';
    layer.className = 'globalFx';
    layer.setAttribute('aria-hidden', 'true');
    document.body.appendChild(layer);
  }
  return layer;
}

function trimSparks(layer, max = SPARK_LIMIT){
  const sparks = layer.querySelectorAll('.spark');
  const extra = sparks.length - max;
  for (let i = 0; i < extra; i++) sparks[i].remove();
}

function cloudBurst(){
  spawnSparks(8, 0, true);
}

function spawnSparks(count = 28, delay = 0, compact = false){
  count = Math.min(count, compact ? 10 : 28);
  if (reducedMotion) count = Math.min(count, compact ? 4 : 10);
  const layer = fxLayer(); // fixed-слой поверх всего: модалки, навигации и WebView
  const source = $('#rollBtn') || $('#app');
  const sr = source ? source.getBoundingClientRect() : null;
  const cx = sr ? sr.left + sr.width / 2 : window.innerWidth / 2;
  const cy = sr ? sr.top + sr.height / 2 : window.innerHeight * .45;
  const minSide = Math.min(window.innerWidth || 360, window.innerHeight || 640, 520);
  const frag = document.createDocumentFragment();
  const created = [];
  let maxLife = 0;

  trimSparks(layer, Math.max(0, SPARK_LIMIT - count));

  for (let i = 0; i < count; i++){
    const s = document.createElement('span');
    s.className = 'spark';
    s.textContent = rnd(SPARK_CHARS);

    const sizeRandom = Math.random();
    const fontSize = compact
      ? (18 + Math.random() * 18)
      : sizeRandom < 0.2
        ? (34 + Math.random() * 12)
        : sizeRandom < 0.78
          ? (22 + Math.random() * 12)
          : (15 + Math.random() * 7);

    const angle = Math.random() * Math.PI * 2;
    const distance = (compact ? 72 : 130) + Math.random() * (compact ? 90 : Math.max(170, minSide * .52));
    const startX = cx + (Math.random() * 28 - 14);
    const startY = cy + (Math.random() * 28 - 14);
    const endX = startX + Math.cos(angle) * distance;
    const endY = startY + Math.sin(angle) * distance - (compact ? 35 : 70);
    const midX = startX + (endX - startX) * .22;
    const midY = startY + (endY - startY) * .22 - 28;
    const rot = Math.random() * 520 - 260;
    const duration = Math.round((compact ? 780 : 980) + Math.random() * (compact ? 260 : 420));
    const particleDelay = Math.round(delay + Math.random() * 90);

    s.style.setProperty('--fs', fontSize.toFixed(0) + 'px');
    s.style.setProperty('--sx', startX.toFixed(1) + 'px');
    s.style.setProperty('--sy', startY.toFixed(1) + 'px');
    s.style.setProperty('--mx', midX.toFixed(1) + 'px');
    s.style.setProperty('--my', midY.toFixed(1) + 'px');
    s.style.setProperty('--ex', endX.toFixed(1) + 'px');
    s.style.setProperty('--ey', endY.toFixed(1) + 'px');
    s.style.setProperty('--rot', rot.toFixed(0) + 'deg');
    s.style.setProperty('--rot-mid', (rot * .22).toFixed(0) + 'deg');
    s.style.setProperty('--dur', duration + 'ms');
    s.style.setProperty('--delay', particleDelay + 'ms');

    frag.appendChild(s);
    created.push(s);
    maxLife = Math.max(maxLife, duration + particleDelay);
  }

  layer.appendChild(frag);
  trimSparks(layer);
  setTimeout(() => created.forEach(s => s.remove()), maxLife + 140);
}

function shakeEffects(){

}

  const box = $('#dotsRandom');

  const COL = ['var(--lilac-deep)','var(--rose)','var(--sky)','var(--butter)','var(--mint)'];

      <div class="acts">
        <button class="act" data-act="seen" aria-pressed="${seen}">${seen ? 'Смотрел ✓' : 'Смотрел'}</button>
        <button class="act" data-act="list" aria-pressed="${listed}">${listed ? 'В очереди ⭐' : 'Посмотрю'}</button>
        <button class="act" data-act="skip" aria-pressed="false">Не хочу</button>
      </div>
    </div>`;
}

/* открыть/закрыть модалку результата */
function openResult(){
  $('#resultBackdrop').hidden = false;
  $('#resultModal').hidden = false;
  $('#resultScroll').scrollTop = 0;
}
function closeResult(){
  $('#resultBackdrop').hidden = true;
  $('#resultModal').hidden = true;
}

// фильтр офлайн-резерва (жанры — по ИЛИ, плюс страна и эпоха)
function getPool(){
  return ALL_TITLES.filter(t =>
    !state.rejected.has(t.id) &&
    (state.typeFilters.size === 0 || state.typeFilters.has(t.type)) &&
    (state.genreFilters.size === 0 || t.genres.some(g => state.genreFilters.has(g))) &&
    (state.origin === 'any' || t.origin === state.origin) &&
    inEra(t.year, state.era)
  );
}

let rolling = false;
const wait = ms => new Promise(res => setTimeout(res, ms));

// один запрос случайного тайтла под все текущие фильтры
function pullRandom(){
  return DataAPI.getRandomTitle(
    [...state.typeFilters], [...state.genreFilters], state.origin, state.era);
}

async function roll(){
  if (rolling) return;
  rolling = true;
  const cloud = $('#rollBtn');

  // Визуальная реакция на тряску: экран дёргается, из облака и поверх экрана летят кино-эмодзи.
  shakeEffects();

  cloud.classList.add('rattle');
  // тряска идёт 0.8s — даём ей доиграть, пока в фоне грузится тайтл
  const minSpin = wait(reducedMotion ? 0 : 760);

  let t = null;
  if (TMDB_ENABLED){
    try {
      t = await pullRandom();
      // редкая коллизия с «Не хочу» или повтором — одна перекрутка
      if (t && (state.rejected.has(t.id) || (state.current && t.id === state.current.id))){
        t = (await pullRandom()) || t;
      }
    } catch (err){
      console.warn('TMDB недоступен, беру офлайн-резерв:', err);
      if (ALL_TITLES.length) toast('Интернет икнул — достаю из запасов 📦');
    }
  }

  if (!t){ // нет ключа, нет сети или TMDB пуст под фильтры → офлайн-резерв
    const pool = getPool();
    if (!pool.length){
      cloud.classList.remove('rattle');
      rolling = false;
      // отличаем «база пуста» от «фильтры слишком узкие»
      if (!ALL_TITLES.length){
        toast(TMDB_ENABLED
          ? 'Нет соединения с базой 📡 Проверь интернет'
          : 'Офлайн-база пока пуста — подключи TMDB или загрузи свою базу');
      } else {
        toast('Под такие фильтры пусто 😅 Сними пару или жми «Сбросить»');
      }
      return;
    }
    t = rnd(pool);
    if (pool.length > 1 && state.current){
      while (t.id === state.current.id) t = rnd(pool); // без повтора подряд
    }
  }

  await minSpin;
  state.current = t;
  cloud.classList.remove('rattle');
  renderResult(t);
  openResult();          // выезжает модалка с тайтлом
  spawnSparks(16);       // лёгкая волна при появлении результата
  rolling = false;
}

/* ── фильтры рандома ── */
function renderFilterChips(){
  $('#typeChips').innerHTML = Object.entries(TYPES).map(([key, tp]) =>
    `<button class="chip c-${tp.c}" data-kind="type" data-val="${key}"
             aria-pressed="false">${tp.emoji} ${tp.name}</button>`).join('');
  $('#genreChips').innerHTML = GENRES.map((g, i) =>
    `<button class="chip c-${GENRE_C[i % GENRE_C.length]}" data-kind="genre"
             data-val="${g}" aria-pressed="false">${g}</button>`).join('');
  // страна — одиночный выбор
  $('#originChips').innerHTML = Object.entries(ORIGINS).map(([key, o], i) =>
    `<button class="chip c-${['mint','sky','peach'][i]}" data-kind="origin" data-val="${key}"
             aria-pressed="${state.origin === key}">${o.label}</button>`).join('');
  // годы — одиночный выбор, с подписью диапазона
  $('#eraChips').innerHTML = Object.entries(ERAS).map(([key, e], i) =>
    `<button class="chip c-${GENRE_C[i % GENRE_C.length]}" data-kind="era" data-val="${key}"
             aria-pressed="${state.era === key}">${e.label}${e.sub ? ` <i style="font-style:normal;opacity:.7">${e.sub}</i>` : ''}</button>`).join('');
}

function renderStatus(){
  const parts = [
    ...[...state.typeFilters].map(k => TYPES[k].low),
    ...state.genreFilters,
  ];
  if (state.origin !== 'any') parts.push(ORIGINS[state.origin].label.toLowerCase());
  if (state.era !== 'any') parts.push(ERAS[state.era].label.toLowerCase());

  $('#statusLine').innerHTML = parts.length
    ? `Сейчас ищем: <b>${parts.map(esc).join(' + ')}</b>`
    : '<b>Всё подряд</b> — выбери, что хочется 👇';
  $('#resetBtn').disabled = parts.length === 0 && state.rejected.size === 0;

  // счётчик активных фильтров на шестерёнке
  const count = state.typeFilters.size + state.genreFilters.size
    + (state.origin !== 'any' ? 1 : 0) + (state.era !== 'any' ? 1 : 0);
  const badge = $('#fcount');
  badge.textContent = count;
  badge.hidden = count === 0;
  $('#filterBtn').classList.toggle('on', count > 0);
}

/* ── панель фильтров: открыть/закрыть ── */
function openFilters(){
  $('#sheetBackdrop').hidden = false;
  $('#filterSheet').hidden = false;
}
function closeFilters(){
  $('#sheetBackdrop').hidden = true;
  $('#filterSheet').hidden = true;
}

function onChipToggle(e){
  const chip = e.target.closest('.chip');
  if (!chip) return;
  const kind = chip.dataset.kind;
  const val = chip.dataset.val;

  if (kind === 'type' || kind === 'genre'){
    const set = kind === 'type' ? state.typeFilters : state.genreFilters;
    set.has(val) ? set.delete(val) : set.add(val);
    chip.setAttribute('aria-pressed', String(set.has(val)));
  } else { // origin / era — одиночный выбор
    state[kind] = val;
    const box = kind === 'origin' ? '#originChips' : '#eraChips';
    document.querySelectorAll(`${box} .chip`).forEach(c =>
      c.setAttribute('aria-pressed', String(c.dataset.val === val)));
  }
  tmdbPages.clear();   // фильтры сменились — пересчитать число страниц заново
  renderStatus();
}

function resetFilters(){
  state.typeFilters.clear();
  state.genreFilters.clear();
  state.rejected.clear();
  state.origin = 'any';
  state.era = 'any';
  tmdbPages.clear();
  renderFilterChips(); // перерисовать с дефолтными состояниями
  renderStatus();
  toast('Фильтры сброшены');
}

/* ── действия на карточке результата ── */
function onCardAction(e){
  const btn = e.target.closest('.act');
  if (!btn || !state.current) return;
  const t = state.current;
  const id = t.id;
  const act = btn.dataset.act;

  if (act === 'seen'){
    if (inWatched(id)){
      state.watched = state.watched.filter(x => x.t.id !== id);
      toast('Убрали из «Просмотрено»');
    } else {
      state.watched.unshift({ t, stars: 0, note: '' });
      // если был в очереди — убираем оттуда, тайтл «досмотрен»
      state.wishlist = state.wishlist.filter(x => x.t.id !== id);
      toast('В «Просмотрено» 👀 Звёзды поставишь во вкладке');
    }
    saveLists();
    renderResult(t);
  } else if (act === 'list'){
    if (inWishlist(id)){
      state.wishlist = state.wishlist.filter(x => x.t.id !== id);
      toast('Убрали из очереди');
    } else {
      state.wishlist.unshift({ t });
      toast('В очереди ⭐ «Буду смотреть»');
    }
    saveLists();
    renderResult(t);
  } else if (act === 'skip'){
    state.rejected.add(id);
    renderStatus(); // активируем «Сбросить»
    toast('Понял, не твоё. Крутим ещё! 🎲');
    setTimeout(roll, 420);
  }
}

/* ── тряска телефоном ──
   TODO(Capacitor): в APK заменить на @capacitor/motion */
let lastShake = 0;
let lastAcc = null;
function onMotion(e){
  if (state.tab !== 'random') return;
  const a = e.accelerationIncludingGravity;
  if (!a || a.x == null) return;
  if (lastAcc){
    const delta = Math.abs(a.x - lastAcc.x)
                + Math.abs(a.y - lastAcc.y)
                + Math.abs(a.z - lastAcc.z);
    const now = Date.now();
    if (delta > 27 && now - lastShake > 1200){
      lastShake = now;
      roll();
    }
  }
  lastAcc = { x: a.x, y: a.y, z: a.z };
}

function initShake(){
  if (!('DeviceMotionEvent' in window)) return; // десктоп — только кнопка
  if (typeof DeviceMotionEvent.requestPermission === 'function'){
    // iOS 13+: нужен явный жест пользователя
    const btn = $('#motionBtn');
    btn.hidden = false;
    btn.addEventListener('click', async () => {
      try{
        const res = await DeviceMotionEvent.requestPermission();
        if (res === 'granted'){
          window.addEventListener('devicemotion', onMotion);
          btn.hidden = true;
          toast('Тряска включена! 📳');
        } else {
          toast('Без разрешения — только кнопкой 🙃');
        }
      } catch {
        toast('Не вышло включить тряску 😬');
      }
    });
  } else {
    window.addEventListener('devicemotion', onMotion);
  }
}

/* ═══════════════ ВКЛАДКИ «ПРОСМОТРЕНО» И «БУДУ СМОТРЕТЬ» ═══════════════ */

function itemHead(t){
  const hasPoster = Boolean(posterUrl(t.poster, 'w154'));
  return `
    <a class="ithumb${hasPoster ? '' : ' generated'}" href="${googleHref(t)}" target="_blank" rel="noopener"
       aria-label="Открыть поиск по тайтлу">${thumb(t)}</a>`;
}

function itemTitle(t){
  return `<a class="ititle" href="${googleHref(t)}" target="_blank"
            rel="noopener">${esc(t.title)} ↗</a>`;
}

function itemMeta(t){
  const tp = TYPES[t.type];
  return `<div class="imeta">${tp.emoji} ${tp.low} · ${t.year} · ★ ${Number(t.rating).toFixed(1)}</div>`;
}

/* ── «Просмотрено»: звёзды + заметка ── */
function renderWatched(){
  const wrap = $('#watchedList');
  const n = state.watched.length;
  $('#subWatched').textContent = n
    ? `${n} ${plural(n, 'тайтл', 'тайтла', 'тайтлов')}. Ставь звёзды и оставляй пару слов на память.`
    : 'Всё, что ты уже видел. Ставь звёзды и оставляй пару слов на память.';
  if (!n){
    wrap.innerHTML = `
      <div class="lempty">
        ${emptySVG('watched')}
        <div class="big">Пока пусто.</div>
        <div>Жми «Смотрел» в «Рандоме» — тут соберётся твоя коллекция.</div>
      </div>`;
    return;
  }
  wrap.innerHTML = state.watched.map(en => `
    <article class="item" data-id="${en.t.id}">
      ${itemHead(en.t)}
      <div class="ibody">
        ${itemTitle(en.t)}
        ${itemMeta(en.t)}
        <div class="stars" aria-label="Твоя оценка">
          ${[1,2,3,4,5].map(v =>
            `<button class="${v <= en.stars ? 'on' : ''}" data-star="${v}"
                     aria-label="Оценка ${v} из 5">★</button>`).join('')}
        </div>
        <textarea class="note" data-note rows="2" maxlength="200"
          placeholder="Заметка: пара слов на память…">${esc(en.note)}</textarea>
        <div class="irow">
          <button class="ibtn del" data-rm>✖ Убрать</button>
        </div>
      </div>
    </article>`).join('');
}

function onWatchedClick(e){
  const item = e.target.closest('.item');
  if (!item) return;
  const id = item.dataset.id;
  const en = state.watched.find(x => x.t.id === id);
  if (!en) return;

  const star = e.target.closest('[data-star]');
  if (star){
    const v = Number(star.dataset.star);
    en.stars = en.stars === v ? 0 : v; // повторный тап по той же звезде — сброс
    // обновляем звёзды на месте, чтобы не сбрасывать фокус с заметки
    item.querySelectorAll('[data-star]').forEach(b =>
      b.classList.toggle('on', Number(b.dataset.star) <= en.stars));
    saveLists();
    return;
  }
  if (e.target.closest('[data-rm]')){
    state.watched = state.watched.filter(x => x.t.id !== id);
    saveLists();
    renderWatched();
    if (state.current && state.current.id === id) renderResult(state.current);
    toast('Убрали из «Просмотрено»');
  }
}

function onWatchedInput(e){
  if (!e.target.matches('[data-note]')) return;
  const item = e.target.closest('.item');
  const en = state.watched.find(x => x.t.id === item.dataset.id);
  if (en){
    en.note = e.target.value;
    saveLists();
  }
}

/* ── «Буду смотреть»: очередь + переезд в «Просмотрено» ── */
function renderWishlist(){
  const wrap = $('#watchlistList');
  const n = state.wishlist.length;
  $('#subList').textContent = n
    ? `${n} в очереди. Посмотрел — жми «✓ Посмотрел», и тайтл переедет в «Просмотрено».`
    : 'Очередь на вечера. Посмотрел — жми «✓ Посмотрел», и тайтл переедет в «Просмотрено».';
  if (!n){
    wrap.innerHTML = `
      <div class="lempty">
        ${emptySVG('queue')}
        <div class="big">Очередь пуста.</div>
        <div>Жми «Посмотрю» в «Рандоме» — соберём план на вечера.</div>
      </div>`;
    return;
  }
  wrap.innerHTML = state.wishlist.map(en => `
    <article class="item" data-id="${en.t.id}">
      ${itemHead(en.t)}
      <div class="ibody">
        ${itemTitle(en.t)}
        ${itemMeta(en.t)}
        <p class="idesc">${esc(en.t.desc)}</p>
        <div class="irow">
          <button class="ibtn go" data-done>✓ Посмотрел</button>
          <button class="ibtn del" data-rm>✖ Убрать</button>
        </div>
      </div>
    </article>`).join('');
}

function onWishlistClick(e){
  const item = e.target.closest('.item');
  if (!item) return;
  const id = item.dataset.id;
  const en = state.wishlist.find(x => x.t.id === id);
  if (!en) return;

  if (e.target.closest('[data-done]')){
    state.wishlist = state.wishlist.filter(x => x.t.id !== id);
    state.watched.unshift({ t: en.t, stars: 0, note: '' });
    saveLists();
    renderWishlist();
    if (state.current && state.current.id === id) renderResult(state.current);
    toast('Переехал в «Просмотрено» ✓ Не забудь звёзды!');
  } else if (e.target.closest('[data-rm]')){
    state.wishlist = state.wishlist.filter(x => x.t.id !== id);
    saveLists();
    renderWishlist();
    if (state.current && state.current.id === id) renderResult(state.current);
    toast('Убрали из очереди');
  }
}

/* ═══════════════════════ ВКЛАДКИ И ПАСХАЛКА ═══════════════════════ */

const TABS = {
  random:    { sec: '#tab-random',    nav: '#navRandom'  },
  watched:   { sec: '#tab-watched',   nav: '#navWatched' },
  watchlist: { sec: '#tab-watchlist', nav: '#navList'    },
};

function setTab(tab){
  if (state.tab === tab) return;
  state.tab = tab;
  for (const [key, ref] of Object.entries(TABS)){
    const on = key === tab;
    $(ref.sec).hidden = !on;
    const nav = $(ref.nav);
    nav.classList.toggle('active', on);
    if (on) nav.setAttribute('aria-current', 'page');
    else nav.removeAttribute('aria-current');
  }
  if (tab === 'watched') renderWatched();
  if (tab === 'watchlist') renderWishlist();
  $('#main').scrollTop = 0;
}

/* ═══════════════════════ СТАРТ ═══════════════════════ */

async function init(){
  loadLists();                       // поднять сохранённые списки
  ALL_TITLES = await DataAPI.getTitles();

  // первый рендер
  paintDots();
  renderFilterChips();
  renderStatus();

  // события — «Рандом»
  $('#rollBtn').addEventListener('click', roll);
  $('#resultScroll').addEventListener('click', onCardAction);
  $('#resultClose').addEventListener('click', closeResult);
  $('#resultBackdrop').addEventListener('click', closeResult);

  // панель фильтров
  $('#resetBtn').addEventListener('click', resetFilters);
  $('#typeChips').addEventListener('click', onChipToggle);
  $('#genreChips').addEventListener('click', onChipToggle);
  $('#originChips').addEventListener('click', onChipToggle);
  $('#eraChips').addEventListener('click', onChipToggle);
  $('#filterBtn').addEventListener('click', openFilters);
  $('#filterClose').addEventListener('click', closeFilters);
  $('#sheetBackdrop').addEventListener('click', closeFilters);

  // события — списки
  $('#watchedList').addEventListener('click', onWatchedClick);
  $('#watchedList').addEventListener('input', onWatchedInput);
  $('#watchlistList').addEventListener('click', onWishlistClick);

  // навигация
  $('#navRandom').addEventListener('click', () => setTab('random'));
  $('#navWatched').addEventListener('click', () => setTab('watched'));
  $('#navList').addEventListener('click', () => setTab('watchlist'));

  // Escape закрывает то, что открыто
  document.addEventListener('keydown', e => {
    if (e.key !== 'Escape') return;
    if (!$('#resultModal').hidden) closeResult();
    else if (!$('#filterSheet').hidden) closeFilters();
  });

  initShake();
}

init();
</script>
